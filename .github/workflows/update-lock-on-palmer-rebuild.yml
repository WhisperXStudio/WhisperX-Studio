name: Update pnpm lock for Palmer rebuild

on:
  push:
    branches: [rebuild/palmer-visual-parity]
    paths:
      - package.json
      - .github/workflows/update-lock-on-palmer-rebuild.yml

permissions:
  contents: write

jobs:
  lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: rebuild/palmer-visual-parity
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --lockfile-only
      - name: Commit generated lockfile
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "Lockfile already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore: update pnpm lock for motion"
          git push origin HEAD:rebuild/palmer-visual-parity
