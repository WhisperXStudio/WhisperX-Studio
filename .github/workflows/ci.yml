name: CI

on:
  pull_request:
  push:
    branches: [main, master, work]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate, build, and render
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        shell: bash
        run: |
          set -o pipefail
          pnpm typecheck 2>&1 | tee typecheck.log

      - name: Lint
        shell: bash
        run: |
          set -o pipefail
          pnpm lint 2>&1 | tee lint.log

      - name: Validate legacy registry
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:registry 2>&1 | tee registry.log

      - name: Validate marketplace catalog
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:marketplace 2>&1 | tee marketplace.log

      - name: Validate design reference
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:design-lock 2>&1 | tee design-lock.log

      - name: Validate UI UX design intelligence
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:design-intelligence 2>&1 | tee design-intelligence.log

      - name: Validate system-wide UI UX
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:ui-system 2>&1 | tee ui-system.log

      - name: Validate production polish
        shell: bash
        run: |
          set -o pipefail
          pnpm validate:production-polish 2>&1 | tee production-polish.log

      - name: Production build
        shell: bash
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Capture production render evidence
        shell: bash
        run: |
          set -o pipefail
          bash scripts/capture-production-evidence.sh 2>&1 | tee production-render.log
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence
          path: |
            typecheck.log
            lint.log
            registry.log
            marketplace.log
            design-lock.log
            design-intelligence.log
            ui-system.log
            production-polish.log
            build.log
            production-runtime.log
            production-render.log
            artifacts/full-html/system-production-polish-v1/production-screenshots/*.png
          if-no-files-found: ignore
          retention-days: 90
